function getEmpresas() {

function compressImage(dataUrl, maxW=800) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxW/img.width);
      const canvas = document.createElement("canvas");
      canvas.width = img.width*scale; canvas.height = img.height*scale;
      canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
      resolve(canvas.toDataURL("image/jpeg",0.6));
    };
    img.src = dataUrl;
  });
}

const CLIMAS = ["Sol","Parcialmente Nublado","Nublado","Garoa","Chuva Fraca","Chuva Forte"];
function climaBadge(c) {
  if (!c) return "badge-nublado";
  const l = c.toLowerCase();
  if (l==="sol") return "badge-sol";
  if (l.includes("parcial")) return "badge-parcial";
  if (l.includes("garoa")) return "badge-garoa";
  if (l.includes("chuva")) return "badge-chuva";
  return "badge-nublado";
}
function fmtDate(d) {
  if (!d) return "";
  const [y,m,dia] = d.split("-");
  return `${dia}/${m}/${y}`;
}
function emptyForm() {
  return {
    obra:"Hilton Garden Inn — Itapema",
    data: new Date().toISOString().slice(0,10),
    clima:"Sol", servicos:[""],
    totalFuncionarios:"", responsavel:"",
    terceiros:[], observacoes:"", fotos:[],
  };
}

// ── LOGIN MODAL ──
function LoginModal({ onSuccess, onClose }) {
  const [pin, setPin] = useState("");
  const [error, setError] = useState("");
  const inputRef = useRef();
  useEffect(() => { setTimeout(()=>inputRef.current?.focus(),100); }, []);
  const submit = () => {
    if (pin === ADMIN_PIN) { onSuccess(); }
    else { setError("Senha incorreta."); setPin(""); }
  };
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">Acesso Admin</div>
        <div className="modal-sub">INSIRA A SENHA PARA EDITAR</div>
        <div className="field">
          <label className="label">Senha</label>
          <input
            ref={inputRef}
            className="input" type="password" value={pin}
            onChange={e=>setPin(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&submit()}
            placeholder="••••••••"
          />
          {error && <div className="modal-error">{error}</div>}
        </div>
        <div className="modal-actions">
          <button className="btn btn-outline btn-sm" onClick={onClose}>Cancelar</button>
          <button className="btn btn-gold btn-sm" onClick={submit}>Entrar</button>
        </div>
      </div>
    </div>
  );
}

  const fileRef = useRef();

  useEffect(() => {
    // Verifica sessão salva
    if (sessionStorage.getItem("hilton_admin") === ADMIN_PIN) setIsAdmin(true);
    const unsub = db.collection("relatorios")
      .orderBy("createdAt","desc")
      .onSnapshot(snap => {
        setReports(snap.docs.map(d=>({id:d.id,...d.data()})));
        setLoading(false); setSynced(true);
      }, () => { setLoading(false); setSynced(false); });
    return () => unsub();
  }, []);

  // Executa ação após login
  useEffect(() => {
    if (isAdmin && pendingAction) { pendingAction(); setPendingAction(null); }
  }, [isAdmin]);

  const requireAdmin = (action) => {
    if (isAdmin) { action(); }
    else { setPendingAction(()=>action); setShowLogin(true); }
  };

  const handleLoginSuccess = () => {
    sessionStorage.setItem("hilton_admin", ADMIN_PIN);
    setIsAdmin(true); setShowLogin(false);
  };

  const logout = () => { sessionStorage.removeItem("hilton_admin"); setIsAdmin(false); };

  const openNew = () => requireAdmin(() => { setForm(emptyForm()); setEditId(null); setView("form"); });
  const openEdit = (r) => requireAdmin(() => { setForm({...r}); setEditId(r.id); setView("form"); });
  const openPreview = (r) => { setPreview(r); setView("preview"); };
  const back = () => setView("list");

  const handleDelete = (id) => requireAdmin(async () => {
    if (!window.confirm("Excluir este relatório?")) return;
    await db.collection("relatorios").doc(id).delete();
  });

  const handleSave = async () => {
    if (!form.obra.trim()) { alert("Informe o nome da obra."); return; }
    if (!form.data) { alert("Informe a data."); return; }
    setSaving(true);
    try {
      const payload = {...form, updatedAt: firebase.firestore.FieldValue.serverTimestamp()};
      if (editId) {
        await db.collection("relatorios").doc(editId).update(payload);
      } else {
        payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection("relatorios").add(payload);
      }
      setView("list");
    } catch(e) { alert("Erro ao salvar: "+e.message); }
    setSaving(false);
  };

  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const setServico = (i,v) => { const s=[...form.servicos]; s[i]=v; set("servicos",s); };
  const addServico = () => set("servicos",[...form.servicos,""]);
  const removeServico = (i) => set("servicos",form.servicos.filter((_,j)=>j!==i));
  const addTerceiro = () => set("terceiros",[...form.terceiros,{nome:"",empresa:"",funcao:"",qtd:""}]);
  const setTerceiro = (i,k,v) => { const t=[...form.terceiros]; t[i]={...t[i],[k]:v}; set("terceiros",t); };
  const removeTerceiro = (i) => set("terceiros",form.terceiros.filter((_,j)=>j!==i));
  const handleFotos = (e) => {
    [...e.target.files].forEach(file => {
      const reader = new FileReader();
      reader.onload = async (ev) => {
        const compressed = await compressImage(ev.target.result, 800);
        set("fotos", [...form.fotos, {name:file.name, data:compressed}]);
      };
      reader.readAsDataURL(file);
    });
    e.target.value="";
  };
  const removeFoto = (i) => set("fotos",form.fotos.filter((_,j)=>j!==i));

  const totalFunc = reports.reduce((s,r)=>s+(parseInt(r.totalFuncionarios)||0),0);
  const totalServ = reports.reduce((s,r)=>s+r.servicos.filter(v=>v.trim()).length,0);

  return (
    <>
      <style>{STYLE}</style>
      {showLogin && <LoginModal onSuccess={handleLoginSuccess} onClose={()=>setShowLogin(false)} />}

        <header className="header no-print">
          <div className="header-brand">
            <span className="header-logo">HILTON</span>
            <span style={{color:"var(--border)"}}>|</span>
            <span className="header-sub">Relatório de Obra</span>
          </div>
          <div className="header-actions">

            }

            {view==="list" && isAdmin && <button className="btn btn-gold btn-sm" onClick={openNew}>+ Novo</button>}
            {view==="preview" && <button className="btn btn-outline btn-sm" onClick={()=>window.print()}>PDF</button>}
          </div>
        </header>

        <main className="main">

          {view==="list" && (
            <>
              <div className="stats-bar">
                <div className="stat-item"><div className="stat-value">{reports.length}</div><div className="stat-label">Relatórios</div></div>

                              <button className="btn-icon" onClick={()=>openEdit(r)}>✏️</button>
                              <button className="btn-icon" onClick={()=>handleDelete(r.id)}>🗑️</button>
                            </div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </>
          )}

          {view==="form" && isAdmin && (
            <div className="panel">
              <div className="panel-header">
                <span className="panel-title">{editId?"Editar Relatório":"Novo Relatório"}</span>
              </div>
              <div className="panel-body">
                <div className="grid-2">
                  <div className="field"><label className="label">Nome da Obra</label><input className="input" value={form.obra} onChange={e=>set("obra",e.target.value)}/></div>
                  <div className="field"><label className="label">Data</label><input className="input" type="date" value={form.data} onChange={e=>set("data",e.target.value)}/></div>
                </div>
                <div className="grid-3">
                  <div className="field"><label className="label">Clima</label><select className="select" value={form.clima} onChange={e=>set("clima",e.target.value)}>{CLIMAS.map(c=><option key={c}>{c}</option>)}</select></div>
                  <div className="field"><label className="label">Total Funcionários</label><input className="input" type="number" min="0" value={form.totalFuncionarios} onChange={e=>set("totalFuncionarios",e.target.value)} placeholder="Ex: 13"/></div>
                  <div className="field"><label className="label">Responsável</label><input className="input" value={form.responsavel} onChange={e=>set("responsavel",e.target.value)} placeholder="Eng. / Mestre"/></div>
                </div>

                <div className="section-divider">Serviços Realizados</div>
                {form.servicos.map((s,i)=>(
                  <div key={i} className="list-item">
                    <input className="input" value={s} onChange={e=>setServico(i,e.target.value)} placeholder={`Serviço ${i+1}`}/>
                    {form.servicos.length>1&&<button className="btn btn-danger btn-sm" onClick={()=>removeServico(i)}>✕</button>}
                  </div>
                ))}
                <button className="add-btn" onClick={addServico}>+ Adicionar Serviço</button>

                <div className="section-divider">Funcionários Terceiros</div>
                {form.terceiros.map((t,i)=>(
                  <div key={i} className="terceiro-row">
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"12px"}}>
                      <div className="field"><label className="label">Empresa</label>
                        <select className="select" value={t.empresa} onChange={e=>setTerceiro(i,"empresa",e.target.value)}>
                          <option value="">Selecione...</option>
                          {getEmpresas().map(emp=><option key={emp.nome} value={emp.nome}>{emp.nome} — {emp.tipo}</option>)}
                        </select>
                      </div>
                      <div className="field"><label className="label">Qtd. Funcionários</label><input className="input" type="number" min="0" value={t.qtd} onChange={e=>setTerceiro(i,"qtd",e.target.value)} placeholder="Ex: 4"/></div>
                    </div>
                    <div className="grid-2">
                      <div className="field"><label className="label">Nome do Responsável</label><input className="input" value={t.nome} onChange={e=>setTerceiro(i,"nome",e.target.value)} placeholder="Nome do responsável"/></div>
                      <div className="field"><label className="label">Função / Serviço</label><input className="input" value={t.funcao} onChange={e=>setTerceiro(i,"funcao",e.target.value)} placeholder="Ex: Instalação elétrica"/></div>
                    </div>
                    <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}>
                      <button className="btn btn-danger btn-sm" onClick={()=>removeTerceiro(i)}>Remover</button>
                    </div>
                  </div>
                ))}
                <button className="add-btn" onClick={addTerceiro}>+ Adicionar Terceiro</button>
                {isAdmin && (
                  <div style={{marginTop:12,display:"flex",gap:8,alignItems:"center"}}>
                    <input
                      className="input"
                      value={novaEmpresa}
                      onChange={e=>setNovaEmpresa(e.target.value)}
                      placeholder="Adicionar nova empresa..."
                      style={{flex:1}}
                    />
                    <button className="btn btn-outline btn-sm" onClick={()=>{
                      const nome = novaEmpresa.trim();
                      if(!nome) return;
                      try {
                        const extra = JSON.parse(localStorage.getItem("hilton_empresas")||"[]");
                        if(!extra.find(e=>e.nome===nome)) {
                          extra.push({nome, tipo:"Terceiro"});
                          localStorage.setItem("hilton_empresas", JSON.stringify(extra));
                        }
                      } catch {}
                      setNovaEmpresa("");
                      alert("Empresa adicionada: " + nome);
                    }} style={{whiteSpace:"nowrap"}}>+ Salvar</button>
                  </div>
                )}

                <div className="section-divider">Observações</div>
                <div className="field"><textarea className="textarea" rows={4} value={form.observacoes} onChange={e=>set("observacoes",e.target.value)} placeholder="Observações do dia..."/></div>

                <div className="section-divider">Fotos</div>
                <div className="foto-grid">
                  {form.fotos.map((f,i)=>(
                    <div key={i} className="foto-item">
                      <img src={f.data} alt={f.name}/>
                      <button className="foto-remove" onClick={()=>removeFoto(i)}>✕</button>
                    </div>
                  ))}
                  <div className="foto-upload-btn" onClick={()=>fileRef.current.click()}>+</div>
                </div>
                <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={handleFotos}/>

                <div className="form-actions">
                  <button className="btn btn-outline" onClick={back}>Cancelar</button>
                  <button className="btn btn-gold" onClick={handleSave} disabled={saving}>{saving?"Salvando...":"Salvar Relatório"}</button>
                </div>
              </div>
            </div>
          )}

          {view==="preview" && preview && (
            <div className="print-wrapper">
              <div className="preview-toolbar no-print">
                {isAdmin && <button className="btn btn-outline btn-sm" onClick={()=>openEdit(preview)}>✏️ Editar</button>}
                <button className="btn btn-gold btn-sm" onClick={()=>window.print()}>Imprimir / PDF</button>
              </div>
              <div className="print-doc">
                <div className="print-doc-header">
                  <div className="print-doc-obra">{preview.obra}</div>
                  <div className="print-doc-titulo">Relatório de Obra Diária</div>
                </div>
                <hr className="print-doc-hr"/>
                <div className="print-field"><b>Data:</b> {fmtDate(preview.data)}</div>
                <div className="print-field"><b>Clima:</b> {preview.clima}</div>
                <hr className="print-doc-hr"/>
                {preview.servicos.filter(s=>s.trim()).length>0&&(
                  <div className="print-section">
                    <div className="print-section-title">Serviços Realizados:</div>
                    <ul className="print-list">{preview.servicos.filter(s=>s.trim()).map((s,i)=><li key={i}>{s}</li>)}</ul>
                  </div>
                )}
                <div className="print-section">
                  <div className="print-section-title">Funcionários:</div>
                  {preview.totalFuncionarios&&<p className="print-field">{preview.totalFuncionarios} funcionários no total</p>}
                  {preview.responsavel&&<p className="print-field"><b>Responsável:</b> {preview.responsavel}</p>}
                  {preview.terceiros?.filter(t=>t.nome.trim()).length>0&&(
                    <>
                      <p className="print-field" style={{marginTop:8}}><b>Terceiros:</b></p>
                      <ul className="print-list">{preview.terceiros.filter(t=>t.nome.trim()).map((t,i)=><li key={i}><b>{t.empresa||t.nome}</b>{t.qtd?` — ${t.qtd} func.`:""}{t.funcao?` · ${t.funcao}`:""}{t.nome&&t.empresa?` (resp: ${t.nome})`:""}</li>)}</ul>
                    </>
                  )}
                </div>
                {preview.observacoes?.trim()&&(
                  <div className="print-section">
                    <div className="print-section-title">Observações:</div>
                    <p className="print-obs">{preview.observacoes}</p>
                  </div>
                )}
                {preview.fotos?.length>0&&(
                  <div className="print-section">
                    <div className="print-section-title">Imagens:</div>
                    <div className="print-foto-grid">{preview.fotos.map((f,i)=><img key={i} src={f.data} alt={f.name}/>)}</div>
                  </div>
                )}
                <div className="print-signature">
                  <p><b>Responsável:</b> {preview.responsavel||"___________________________"}</p>
                  <p style={{marginTop:28,color:"#999",fontSize:11}}>Gerado em {new Date().toLocaleDateString("pt-BR")}</p>
                </div>
              </div>
            </div>
          )}

        </main>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
